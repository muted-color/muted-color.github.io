---
layout: default
---
<article class="essay">
  <header class="essay-header">
    <p class="eyebrow">Applied LLM Research</p>
    <h1 class="essay-title">{{ page.title }}</h1>
    <div class="essay-meta">
      <span class="essay-author">{{ site.author.name }}</span>
      <span class="meta-sep">·</span>
      <time class="essay-date" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%b %d, %Y" }}</time>
    </div>
    {% if page.excerpt %}
      <p class="essay-dek">{{ page.excerpt | strip_html }}</p>
    {% endif %}
  </header>

  <div class="essay-hero" aria-hidden="true">
    {% if page.hero_image %}
      <img class="essay-hero-image" src="{{ page.hero_image | relative_url }}" alt="">
    {% else %}
      <div class="essay-hero-placeholder"></div>
    {% endif %}
  </div>

  <div class="essay-grid">
    <aside class="essay-sidebar">
      <div class="essay-sidebar-inner">
        <p class="toc-label">Contents</p>
        <nav class="toc-nav" id="toc"></nav>
      </div>
    </aside>

    <section class="essay-body" id="essay-body">
      {{ content }}
    </section>
  </div>
</article>

<script>
  (function () {
    var root = document.getElementById("essay-body");
    var toc = document.getElementById("toc");
    if (!root || !toc) return;

    var headings = root.querySelectorAll("h2, h3");
    if (!headings.length) {
      toc.innerHTML = '<p class="toc-empty">No sections yet.</p>';
      return;
    }

    var list = document.createElement("ol");
    list.className = "toc-list";

    var links = [];

    headings.forEach(function (heading, index) {
      if (!heading.id) {
        heading.id = "section-" + (index + 1);
      }

      var item = document.createElement("li");
      item.className = "toc-item toc-" + heading.tagName.toLowerCase();

      var link = document.createElement("a");
      link.href = "#" + heading.id;
      link.textContent = heading.textContent;

      item.appendChild(link);
      list.appendChild(item);
      links.push({ heading: heading, link: link });
    });

    toc.appendChild(list);

    if (!("IntersectionObserver" in window)) return;

    var observer = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          var matched = links.find(function (pair) {
            return pair.heading === entry.target;
          });

          if (!matched) return;

          if (entry.isIntersecting) {
            links.forEach(function (pair) {
              pair.link.classList.remove("is-active");
            });
            matched.link.classList.add("is-active");
          }
        });
      },
      {
        rootMargin: "-20% 0px -65% 0px",
        threshold: 0
      }
    );

    links.forEach(function (pair) {
      observer.observe(pair.heading);
    });
  })();
</script>
