<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 420" role="img" aria-labelledby="title desc">
  <title id="title">Empirical Prior Hit@64 Delta</title>
  <desc id="desc">A horizontal bar plot showing Hit@64 deltas below zero for label budgets 64, 128, and 256 when empirical local prior is added to the oracle-only baseline.</desc>
  <rect width="1040" height="420" fill="#ffffff"/>

  <defs>
    <style>
      text { font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .title { fill: #111111; font-size: 15px; font-weight: 700; }
      .axis { fill: #5f6672; font-size: 12px; font-weight: 600; }
      .tick { fill: #5f6672; font-size: 12px; font-weight: 500; }
      .value { fill: #ffffff; font-size: 13px; font-weight: 700; }
      .grid { stroke: #e6e8ee; stroke-width: 1; stroke-dasharray: 4 8; }
      .zero { stroke: #111111; stroke-width: 1.4; }
      .bar { fill: #3f41ff; }
    </style>
  </defs>

  <g transform="translate(0 34)">
    <text x="520" y="0" text-anchor="middle" class="title">Empirical Prior Hit@64 Delta</text>
  </g>

  <g transform="translate(132 86)">
    <g>
      <line x1="60" y1="0" x2="60" y2="250" class="grid"/>
      <line x1="225" y1="0" x2="225" y2="250" class="grid"/>
      <line x1="390" y1="0" x2="390" y2="250" class="grid"/>
      <line x1="555" y1="0" x2="555" y2="250" class="grid"/>
      <line x1="720" y1="0" x2="720" y2="250" class="zero"/>
      <line x1="60" y1="250" x2="720" y2="250" stroke="#e6e8ee" stroke-width="1"/>
    </g>

    <g class="axis">
      <text x="390" y="304" text-anchor="middle">Hit@64 delta vs oracle-only</text>
      <text x="-24" y="128" text-anchor="middle" transform="rotate(-90 -24 128)">Label budget</text>
    </g>

    <g class="tick">
      <text x="60" y="278" text-anchor="middle">-0.20</text>
      <text x="225" y="278" text-anchor="middle">-0.15</text>
      <text x="390" y="278" text-anchor="middle">-0.10</text>
      <text x="555" y="278" text-anchor="middle">-0.05</text>
      <text x="720" y="278" text-anchor="middle">0</text>

      <text x="38" y="60" text-anchor="end">64</text>
      <text x="38" y="140" text-anchor="end">128</text>
      <text x="38" y="220" text-anchor="end">256</text>
    </g>

    <g>
      <rect x="601.2" y="39" width="118.8" height="28" rx="7" class="bar"/>
      <rect x="205.2" y="119" width="514.8" height="28" rx="7" class="bar"/>
      <rect x="83.1" y="199" width="636.9" height="28" rx="7" class="bar"/>
    </g>

    <g class="value">
      <text x="613.2" y="58" text-anchor="start">-0.036</text>
      <text x="217.2" y="138" text-anchor="start">-0.156</text>
      <text x="95.1" y="218" text-anchor="start">-0.193</text>
    </g>
  </g>
</svg>
