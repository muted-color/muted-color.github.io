<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" role="img" aria-labelledby="title desc">
  <title id="title">AlphaFold WT geometry and pLDDT audit summary</title>
  <desc id="desc">A clean schematic showing a translucent protein ribbon, mutation sites, and paired delta bars for raw geometry and pLDDT gate comparisons.</desc>
  <defs>
    <linearGradient id="glass" x1="120" y1="84" x2="650" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef8ff" stop-opacity="0.92"/>
      <stop offset="0.58" stop-color="#bfe3ff" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#7eb8ff" stop-opacity="0.38"/>
    </linearGradient>
    <linearGradient id="signal" x1="628" y1="210" x2="940" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3f41ff"/>
      <stop offset="1" stop-color="#54c7ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#35506b" flood-opacity="0.16"/>
    </filter>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1200" height="627" fill="#ffffff"/>
  <path d="M0 452 C192 390 292 470 464 420 C650 365 742 250 954 288 C1072 310 1144 372 1200 340 L1200 627 L0 627 Z" fill="#f5f9fc"/>
  <circle cx="1000" cy="132" r="78" fill="#eaf6ff" filter="url(#soft)" opacity="0.78"/>
  <circle cx="181" cy="512" r="88" fill="#edf7ff" filter="url(#soft)" opacity="0.72"/>

  <g filter="url(#shadow)">
    <path d="M170 394 C252 274 334 475 426 354 C514 238 578 389 652 280" fill="none" stroke="url(#glass)" stroke-width="58" stroke-linecap="round"/>
    <path d="M180 393 C260 292 331 452 419 349 C505 250 573 369 642 283" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" opacity="0.72"/>
    <path d="M183 391 C260 295 334 449 419 348 C506 250 572 368 642 285" fill="none" stroke="#589ce7" stroke-width="3" stroke-linecap="round" opacity="0.46"/>
  </g>

  <g opacity="0.9">
    <circle cx="258" cy="320" r="12" fill="#3f41ff"/>
    <circle cx="371" cy="410" r="10" fill="#8ed8f6"/>
    <circle cx="492" cy="305" r="11" fill="#3f41ff"/>
    <circle cx="595" cy="326" r="9" fill="#8ed8f6"/>
  </g>

  <g transform="translate(682 166)">
    <rect x="0" y="0" width="360" height="292" rx="18" fill="#ffffff" stroke="#e1e7ee"/>
    <line x1="56" y1="65" x2="314" y2="65" stroke="#e6ebf1" stroke-width="2"/>
    <line x1="56" y1="130" x2="314" y2="130" stroke="#e6ebf1" stroke-width="2"/>
    <line x1="56" y1="195" x2="314" y2="195" stroke="#e6ebf1" stroke-width="2"/>
    <line x1="168" y1="38" x2="168" y2="226" stroke="#98a3b2" stroke-width="2"/>

    <rect x="168" y="48" width="118" height="24" rx="12" fill="url(#signal)"/>
    <rect x="168" y="113" width="38" height="24" rx="12" fill="#74c7ec"/>
    <rect x="93" y="178" width="75" height="24" rx="12" fill="#f27070"/>
    <rect x="168" y="238" width="18" height="24" rx="9" fill="#74c7ec"/>

    <circle cx="168" cy="60" r="5" fill="#1e2a44"/>
    <circle cx="168" cy="125" r="5" fill="#1e2a44"/>
    <circle cx="168" cy="190" r="5" fill="#1e2a44"/>
    <circle cx="168" cy="250" r="5" fill="#1e2a44"/>
  </g>

  <g opacity="0.8">
    <path d="M638 304 C660 296 671 283 682 269" fill="none" stroke="#b9c6d4" stroke-width="2" stroke-dasharray="6 8"/>
    <path d="M602 331 C640 340 658 367 682 383" fill="none" stroke="#b9c6d4" stroke-width="2" stroke-dasharray="6 8"/>
  </g>
</svg>
