<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 500" role="img" aria-labelledby="title desc">
  <title id="title">DPO delta versus position baseline</title>
  <desc id="desc">A scatter chart plots DPO delta top-25 hit rate against position baseline top-25 hit rate. Filled purple points are highlighted conditions, faded points provide context, and open purple points mark global-pair caution conditions; the diagonal indicates equality with the position baseline.</desc>
