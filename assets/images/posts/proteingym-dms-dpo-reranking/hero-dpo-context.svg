<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">Same-position reranking check</title>
  <desc id="desc">A horizontal bar chart compares DPO delta, position baseline, and fixed hybrid top-25 hit rates for same-position ProteinGym DMS reranking checks, with random as a reference line.</desc>
  <rect width="1040" height="620" fill="#ffffff"/>
  <defs>
    <style>
      text { font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    </style>
    <pattern id="positionHatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#fbfbff"/>
      <path d="M-2 6 L6 -2 M2 10 L10 2" stroke="#8e94ff" stroke-width="1.35" stroke-linecap="round" opacity="0.48"/>
      <path d="M-2 2 L2 -2 M6 10 L10 6" stroke="#8e94ff" stroke-width="1.35" stroke-linecap="round" opacity="0.48"/>
    </pattern>
  </defs>

  <g font-family="'Plus Jakarta Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <g font-size="11.5" font-weight="650" fill="#111111">
      <circle cx="92" cy="54" r="5" fill="#3f41ff"/>
      <text x="108" y="58">DPO delta</text>
      <rect x="211" y="48.5" width="11" height="11" rx="2.8" fill="url(#positionHatch)" stroke="#8e94ff" stroke-width="1"/>
      <text x="234" y="58">Position baseline</text>
      <rect x="382" y="48.5" width="24" height="11" rx="5.5" fill="#69b7ff"/>
      <text x="422" y="58">Fixed hybrid</text>
      <line x1="544" y1="45" x2="544" y2="63" stroke="#a3a9b4" stroke-width="2.4" stroke-linecap="round"/>
      <text x="562" y="58">Random</text>
    </g>

    <g stroke="#e9ecf2" stroke-width="1.1">
      <line x1="88" y1="106" x2="952" y2="106"/>
      <line x1="88" y1="190" x2="952" y2="190"/>
      <line x1="88" y1="274" x2="952" y2="274"/>
      <line x1="88" y1="358" x2="952" y2="358"/>
      <line x1="88" y1="442" x2="952" y2="442"/>
      <line x1="88" y1="526" x2="952" y2="526"/>
    </g>

    <g stroke="#eef1f6" stroke-width="1" stroke-dasharray="4 9">
      <line x1="350" y1="98" x2="350" y2="548"/>
      <line x1="490" y1="98" x2="490" y2="548"/>
      <line x1="630" y1="98" x2="630" y2="548"/>
      <line x1="770" y1="98" x2="770" y2="548"/>
      <line x1="910" y1="98" x2="910" y2="548"/>
    </g>
    <line x1="493" y1="126" x2="493" y2="510" stroke="#a3a9b4" stroke-width="2.4" stroke-linecap="round" opacity="0.82"/>

    <g font-size="11" font-weight="600" fill="#5f6672">
      <text x="350" y="570" text-anchor="middle">0.00</text>
      <text x="490" y="570" text-anchor="middle">0.25</text>
      <text x="630" y="570" text-anchor="middle">0.50</text>
      <text x="770" y="570" text-anchor="middle">0.75</text>
      <text x="910" y="570" text-anchor="middle">1.00</text>
      <text x="630" y="604" text-anchor="middle" font-weight="650">Top-25 hit rate</text>
    </g>

    <g font-size="14" font-weight="760" fill="#111111">
      <text x="112" y="143">SQSTM</text>
      <text x="112" y="227">IF1</text>
      <text x="112" y="311">RASK abundance</text>
      <text x="112" y="395">VG08</text>
      <text x="112" y="479">REV_HV1H2</text>
    </g>
    <g font-size="11" font-weight="650" fill="#5f6672">
      <text x="112" y="163">hybrid clears position</text>
      <text x="112" y="247">position remains stronger</text>
      <text x="112" y="331">readout-dependent lift</text>
      <text x="112" y="415">same-position weakens</text>
      <text x="112" y="499">position-low caution</text>
    </g>

    <g>
      <rect x="350" y="124" width="351" height="12" rx="6" fill="#3f41ff"/>
      <rect x="350" y="144" width="403" height="12" rx="6" fill="url(#positionHatch)" stroke="#8e94ff" stroke-width="0.9"/>
      <rect x="350" y="164" width="455" height="12" rx="6" fill="#69b7ff"/>
      <text x="714" y="135" font-size="11" font-weight="720" fill="#3f41ff">0.627</text>
      <text x="766" y="155" font-size="11" font-weight="720" fill="#3f41ff">0.720</text>
      <text x="818" y="175" font-size="11" font-weight="720" fill="#1f72d6">0.813</text>

      <rect x="350" y="208" width="239" height="12" rx="6" fill="#3f41ff"/>
      <rect x="350" y="228" width="426" height="12" rx="6" fill="url(#positionHatch)" stroke="#8e94ff" stroke-width="0.9"/>
      <rect x="350" y="248" width="366" height="12" rx="6" fill="#69b7ff"/>
      <text x="602" y="219" font-size="11" font-weight="720" fill="#3f41ff">0.427</text>
      <text x="788" y="239" font-size="11" font-weight="720" fill="#3f41ff">0.760</text>
      <text x="729" y="259" font-size="11" font-weight="720" fill="#1f72d6">0.653</text>

      <rect x="350" y="292" width="194" height="12" rx="6" fill="#3f41ff"/>
      <rect x="350" y="312" width="403" height="12" rx="6" fill="url(#positionHatch)" stroke="#8e94ff" stroke-width="0.9"/>
      <rect x="350" y="332" width="358" height="12" rx="6" fill="#69b7ff"/>
      <text x="557" y="303" font-size="11" font-weight="720" fill="#3f41ff">0.347</text>
      <text x="766" y="323" font-size="11" font-weight="720" fill="#3f41ff">0.720</text>
      <text x="721" y="343" font-size="11" font-weight="720" fill="#1f72d6">0.640</text>

      <rect x="350" y="376" width="157" height="12" rx="6" fill="#3f41ff"/>
      <rect x="350" y="396" width="358" height="12" rx="6" fill="url(#positionHatch)" stroke="#8e94ff" stroke-width="0.9"/>
      <rect x="350" y="416" width="276" height="12" rx="6" fill="#69b7ff"/>
      <text x="520" y="387" font-size="11" font-weight="720" fill="#3f41ff">0.280</text>
      <text x="721" y="407" font-size="11" font-weight="720" fill="#3f41ff">0.640</text>
      <text x="639" y="427" font-size="11" font-weight="720" fill="#1f72d6">0.493</text>

      <rect x="350" y="460" width="157" height="12" rx="6" fill="#3f41ff"/>
      <rect x="350" y="480" width="90" height="12" rx="6" fill="url(#positionHatch)" stroke="#8e94ff" stroke-width="0.9"/>
      <rect x="350" y="500" width="127" height="12" rx="6" fill="#69b7ff"/>
      <text x="520" y="471" font-size="11" font-weight="720" fill="#3f41ff">0.280</text>
      <text x="452" y="491" font-size="11" font-weight="720" fill="#3f41ff">0.160</text>
      <text x="490" y="511" font-size="11" font-weight="720" fill="#1f72d6">0.227</text>
    </g>
  </g>
</svg>
