<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">Endpoint trade-off map</title>
  <desc id="desc">Two panel endpoint trade-off map comparing public pass against slot stuffing and default slot rate for DPO and GRPO reward variants.</desc>
  <defs>
    <style>
      text { font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing: 0; }
      .panel-title { fill: #111111; font-size: 22px; font-weight: 700; }
      .axis { fill: #5f6672; font-size: 13px; font-weight: 600; }
      .tick { fill: #5f6672; font-size: 11px; font-weight: 400; }
      .label { fill: #111111; font-size: 12px; font-weight: 700; }
      .point-id { fill: #ffffff; font-size: 11px; font-weight: 800; }
      .note { fill: #5f6672; font-size: 13px; font-weight: 400; }
      .callout { fill: #111111; font-size: 14px; font-weight: 700; }
      .grid { stroke: #111111; stroke-opacity: 0.07; stroke-width: 1; }
      .axis-line { stroke: #111111; stroke-opacity: 0.30; stroke-width: 1.2; }
    </style>
  </defs>
  <rect width="1180" height="520" fill="#ffffff"/>

  <!-- Panel A -->
  <g transform="translate(58 52)">
    <text x="0" y="0" class="panel-title">A. public_pass vs slot_stuffing</text>
    <g transform="translate(66 42)">
      <rect x="0" y="0" width="430" height="285" fill="#f8f9fc" stroke="#111111" stroke-opacity="0.08"/>
      <line x1="0" y1="285" x2="430" y2="285" class="axis-line"/>
      <line x1="0" y1="0" x2="0" y2="285" class="axis-line"/>
      <line x1="0" y1="143" x2="430" y2="143" class="grid"/>
      <line x1="0" y1="0" x2="430" y2="0" class="grid"/>
      <line x1="163" y1="0" x2="163" y2="285" class="grid"/>
      <line x1="337" y1="0" x2="337" y2="285" class="grid"/>
      <text x="0" y="307" text-anchor="middle" class="tick">0.35</text>
      <text x="163" y="307" text-anchor="middle" class="tick">0.49</text>
      <text x="337" y="307" text-anchor="middle" class="tick">0.64</text>
      <text x="430" y="307" text-anchor="middle" class="tick">0.72</text>
      <text x="-12" y="289" text-anchor="end" class="tick">0.00</text>
      <text x="-12" y="147" text-anchor="end" class="tick">0.35</text>
      <text x="-12" y="4" text-anchor="end" class="tick">0.70</text>
      <text x="215" y="344" text-anchor="middle" class="axis">public_pass</text>
      <text transform="translate(-50 143) rotate(-90)" text-anchor="middle" class="axis">slot_stuffing</text>
      <circle cx="45" cy="196" r="10" fill="#5f6672"/>
      <text x="45" y="200" text-anchor="middle" class="point-id">1</text>
      <circle cx="276" cy="25" r="10" fill="#3f41ff"/>
      <text x="276" y="29" text-anchor="middle" class="point-id">2</text>
      <circle cx="371" cy="18" r="10" fill="#2529d8"/>
      <text x="371" y="22" text-anchor="middle" class="point-id">3</text>
      <circle cx="400" cy="279" r="10" fill="#111111"/>
      <text x="400" y="283" text-anchor="middle" class="point-id">4</text>
      <circle cx="345" cy="228" r="10" fill="#3f41ff" opacity="0.88"/>
      <text x="345" y="232" text-anchor="middle" class="point-id">5</text>
    </g>
  </g>

  <!-- Panel B -->
  <g transform="translate(626 52)">
    <text x="0" y="0" class="panel-title">B. public_pass vs default_slot_rate</text>
    <g transform="translate(66 42)">
      <rect x="0" y="0" width="430" height="285" fill="#f8f9fc" stroke="#111111" stroke-opacity="0.08"/>
      <line x1="0" y1="285" x2="430" y2="285" class="axis-line"/>
      <line x1="0" y1="0" x2="0" y2="285" class="axis-line"/>
      <line x1="0" y1="143" x2="430" y2="143" class="grid"/>
      <line x1="0" y1="0" x2="430" y2="0" class="grid"/>
      <line x1="163" y1="0" x2="163" y2="285" class="grid"/>
      <line x1="337" y1="0" x2="337" y2="285" class="grid"/>
      <text x="0" y="307" text-anchor="middle" class="tick">0.35</text>
      <text x="163" y="307" text-anchor="middle" class="tick">0.49</text>
      <text x="337" y="307" text-anchor="middle" class="tick">0.64</text>
      <text x="430" y="307" text-anchor="middle" class="tick">0.72</text>
      <text x="-12" y="289" text-anchor="end" class="tick">0.00</text>
      <text x="-12" y="147" text-anchor="end" class="tick">0.20</text>
      <text x="-12" y="4" text-anchor="end" class="tick">0.40</text>
      <text x="215" y="344" text-anchor="middle" class="axis">public_pass</text>
      <text transform="translate(-52 143) rotate(-90)" text-anchor="middle" class="axis">default_slot_rate</text>
      <circle cx="45" cy="233" r="10" fill="#5f6672"/>
      <text x="45" y="237" text-anchor="middle" class="point-id">1</text>
      <circle cx="276" cy="239" r="10" fill="#3f41ff"/>
      <text x="276" y="243" text-anchor="middle" class="point-id">2</text>
      <circle cx="371" cy="245" r="10" fill="#2529d8"/>
      <text x="371" y="249" text-anchor="middle" class="point-id">3</text>
      <circle cx="400" cy="39" r="10" fill="#111111"/>
      <text x="400" y="43" text-anchor="middle" class="point-id">4</text>
      <circle cx="345" cy="237" r="10" fill="#3f41ff" opacity="0.88"/>
      <text x="345" y="241" text-anchor="middle" class="point-id">5</text>
    </g>
  </g>

  <g transform="translate(58 466)">
    <text x="0" y="0" class="note">1 DPO baseline</text>
    <text x="142" y="0" class="note">2 binary</text>
    <text x="232" y="0" class="note">3 dense</text>
    <text x="322" y="0" class="note">4 antistuff</text>
    <text x="438" y="0" class="note">5 antistuff2</text>
    <circle cx="610" cy="-4" r="5" fill="#5f6672"/>
    <text x="624" y="0" class="note">DPO</text>
    <circle cx="680" cy="-4" r="5" fill="#3f41ff"/>
    <text x="694" y="0" class="note">format reward</text>
    <circle cx="820" cy="-4" r="5" fill="#111111"/>
    <text x="834" y="0" class="note">anti-stuffing</text>
    <text x="0" y="30" class="callout">Right and lower is better in both panels.</text>
  </g>
</svg>
