<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
<title id="title">Constrained decoding comparison</title>
<desc id="desc">Grouped bar comparison of constrained decoding variants and RL anti-stuffing across pass and artifact metrics.</desc>
<defs>
  <style>
    text { font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing: 0; }
    .title { fill: #111111; font-size: 22px; font-weight: 700; }
    .panel-title { fill: #111111; font-size: 19px; font-weight: 700; }
    .axis { stroke: #b8bec8; stroke-width: 1.2; }
    .grid { stroke: #dfe3eb; stroke-width: 1; }
    .tick { fill: #566070; font-size: 12px; }
    .label { fill: #566070; font-size: 13px; font-weight: 600; }
    .method { fill: #111111; font-size: 12px; font-weight: 700; }
    .value { fill: #111111; font-size: 10px; font-weight: 700; }
    .legend { fill: #566070; font-size: 13px; }
  </style>
</defs>
<rect width="1180" height="520" fill="#ffffff"/>

<text x="54" y="54" class="title">Constrained decoding comparison</text>

<!-- Panel A: pass metrics -->
<text x="96" y="96" class="panel-title">A. Pass metrics</text>
<text x="96" y="118" class="label">Higher is better</text>

<line x1="112" y1="366" x2="548" y2="366" class="axis"/>
<line x1="112" y1="126" x2="112" y2="366" class="axis"/>
<line x1="112" y1="366" x2="548" y2="366" class="grid"/>
<line x1="112" y1="286" x2="548" y2="286" class="grid"/>
<line x1="112" y1="206" x2="548" y2="206" class="grid"/>
<line x1="112" y1="126" x2="548" y2="126" class="grid"/>
<text x="96" y="370" text-anchor="end" class="tick">0.00</text>
<text x="96" y="290" text-anchor="end" class="tick">0.25</text>
<text x="96" y="210" text-anchor="end" class="tick">0.50</text>
<text x="96" y="130" text-anchor="end" class="tick">0.75</text>

<!-- DPO -->
<rect x="139" y="241.5" width="18" height="124.5" rx="2" fill="#4f52c6"/>
<rect x="160" y="277.0" width="18" height="89.0" rx="2" fill="#8a90ee"/>
<text x="158" y="394" text-anchor="middle" class="method">DPO</text>

<!-- CD schema -->
<rect x="226" y="237.0" width="18" height="129.0" rx="2" fill="#4f52c6"/>
<rect x="247" y="277.0" width="18" height="89.0" rx="2" fill="#8a90ee"/>
<text x="246" y="394" text-anchor="middle" class="method">CD schema</text>

<!-- CD format -->
<rect x="313" y="226.8" width="18" height="139.2" rx="2" fill="#4f52c6"/>
<rect x="334" y="269.0" width="18" height="97.0" rx="2" fill="#8a90ee"/>
<text x="334" y="394" text-anchor="middle" class="method">CD format</text>

<!-- CD cap -->
<rect x="400" y="225.2" width="18" height="140.8" rx="2" fill="#4f52c6"/>
<rect x="421" y="281.2" width="18" height="84.8" rx="2" fill="#8a90ee"/>
<text x="421" y="394" text-anchor="middle" class="method">CD cap</text>

<!-- RL anti -->
<rect x="487" y="143.9" width="18" height="222.1" rx="2" fill="#4f52c6"/>
<rect x="508" y="180.4" width="18" height="185.6" rx="2" fill="#8a90ee"/>
<text x="508" y="394" text-anchor="middle" class="method">RL anti</text>

<!-- Panel B: artifact metrics -->
<text x="650" y="96" class="panel-title">B. Artifact metrics</text>
<text x="650" y="118" class="label">Lower is better</text>

<line x1="666" y1="366" x2="1102" y2="366" class="axis"/>
<line x1="666" y1="126" x2="666" y2="366" class="axis"/>
<line x1="666" y1="366" x2="1102" y2="366" class="grid"/>
<line x1="666" y1="286" x2="1102" y2="286" class="grid"/>
<line x1="666" y1="206" x2="1102" y2="206" class="grid"/>
<line x1="666" y1="126" x2="1102" y2="126" class="grid"/>
<text x="650" y="370" text-anchor="end" class="tick">0.00</text>
<text x="650" y="290" text-anchor="end" class="tick">0.25</text>
<text x="650" y="210" text-anchor="end" class="tick">0.50</text>
<text x="650" y="130" text-anchor="end" class="tick">0.75</text>

<!-- DPO -->
<rect x="693" y="296.2" width="18" height="69.8" rx="2" fill="#111111"/>
<rect x="714" y="301.4" width="18" height="64.6" rx="2" fill="#8b95a5"/>
<text x="712" y="394" text-anchor="middle" class="method">DPO</text>

<!-- CD schema -->
<rect x="780" y="297.2" width="18" height="68.8" rx="2" fill="#111111"/>
<rect x="801" y="301.0" width="18" height="65.0" rx="2" fill="#8b95a5"/>
<text x="800" y="394" text-anchor="middle" class="method">CD schema</text>

<!-- CD format -->
<rect x="867" y="301.4" width="18" height="64.6" rx="2" fill="#111111"/>
<rect x="888" y="241.2" width="18" height="124.8" rx="2" fill="#8b95a5"/>
<text x="888" y="394" text-anchor="middle" class="method">CD format</text>

<!-- CD cap -->
<rect x="954" y="366" width="18" height="0" rx="2" fill="#111111"/>
<rect x="975" y="239.9" width="18" height="126.1" rx="2" fill="#8b95a5"/>
<circle cx="963" cy="366" r="4" fill="#111111"/>
<text x="975" y="394" text-anchor="middle" class="method">CD cap</text>

<!-- RL anti -->
<rect x="1041" y="360.9" width="18" height="5.1" rx="2" fill="#111111"/>
<rect x="1062" y="327.0" width="18" height="39.0" rx="2" fill="#8b95a5"/>
<text x="1062" y="394" text-anchor="middle" class="method">RL anti</text>

<!-- Legend -->
<circle cx="236" cy="456" r="6" fill="#4f52c6"/>
<text x="250" y="461" class="legend">public_pass</text>
<circle cx="366" cy="456" r="6" fill="#8a90ee"/>
<text x="380" y="461" class="legend">hidden_auto_pass</text>
<circle cx="540" cy="456" r="6" fill="#111111"/>
<text x="554" y="461" class="legend">slot_stuffing</text>
<circle cx="684" cy="456" r="6" fill="#8b95a5"/>
<text x="698" y="461" class="legend">length_boundary</text>

</svg>
