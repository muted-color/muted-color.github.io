<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="540" viewBox="0 0 1120 540" role="img" aria-labelledby="title desc">
  <title id="title">judge 표본 방식과 public_judge_gap</title>
  <desc id="desc">앞쪽 400카드와 무작위 400카드 judge 표본에서 binary와 dense의 public_judge_gap 추세가 다르게 보이는 선 그래프.</desc>
  <defs>
    <style>
      text { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans CJK KR", "Malgun Gothic", "Segoe UI", sans-serif; letter-spacing: 0; }
      .title { fill: #111111; font-size: 25px; font-weight: 500; }
      .label { fill: #111111; font-size: 13px; font-weight: 500; }
      .small { fill: #5f6672; font-size: 12px; font-weight: 400; }
      .tick { fill: #5f6672; font-size: 11px; font-weight: 400; }
      .axis { stroke: #9aa1ad; stroke-width: 1.2; }
      .grid { stroke: #d9dde5; stroke-width: 1; opacity: 0.72; }
    </style>
  </defs>
  <rect width="1120" height="540" fill="#ffffff"/>

  <text x="44" y="56" class="title">judge 표본 방식과 public_judge_gap</text>
  <text x="44" y="84" class="small">앞쪽 400카드 표본은 gap 감소처럼 보이지만, 무작위 400카드 표본은 평탄하거나 소폭 상승한다.</text>

  <line x1="90" y1="395" x2="870" y2="395" class="axis"/>
  <line x1="90" y1="115" x2="90" y2="395" class="axis"/>
  <line x1="90" y1="395" x2="870" y2="395" class="grid"/>
  <line x1="90" y1="318.6" x2="870" y2="318.6" class="grid"/>
  <line x1="90" y1="242.3" x2="870" y2="242.3" class="grid"/>
  <line x1="90" y1="165.9" x2="870" y2="165.9" class="grid"/>
  <line x1="90" y1="115" x2="870" y2="115" class="grid"/>
  <text x="76" y="399" text-anchor="end" class="tick">0.06</text>
  <text x="76" y="322.6" text-anchor="end" class="tick">0.09</text>
  <text x="76" y="246.3" text-anchor="end" class="tick">0.12</text>
  <text x="76" y="169.9" text-anchor="end" class="tick">0.15</text>
  <text x="76" y="119" text-anchor="end" class="tick">0.17</text>

  <line x1="90" y1="115" x2="90" y2="395" class="grid" opacity="0.48"/>
  <line x1="282.6" y1="115" x2="282.6" y2="395" class="grid" opacity="0.48"/>
  <line x1="475.2" y1="115" x2="475.2" y2="395" class="grid" opacity="0.48"/>
  <line x1="667.8" y1="115" x2="667.8" y2="395" class="grid" opacity="0.48"/>
  <line x1="870" y1="115" x2="870" y2="395" class="grid" opacity="0.48"/>
  <text x="90" y="421" text-anchor="middle" class="tick">0</text>
  <text x="282.6" y="421" text-anchor="middle" class="tick">200</text>
  <text x="475.2" y="421" text-anchor="middle" class="tick">400</text>
  <text x="667.8" y="421" text-anchor="middle" class="tick">600</text>
  <text x="870" y="421" text-anchor="middle" class="tick">810</text>

  <polyline points="90,146.8 282.6,260.6 475.2,325.0 667.8,292.4 870,350.5" fill="none" stroke="#2f6fdf" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="90" cy="146.8" r="3.5" fill="#ffffff" stroke="#2f6fdf" stroke-width="1.6"/>
  <circle cx="282.6" cy="260.6" r="3.5" fill="#ffffff" stroke="#2f6fdf" stroke-width="1.6"/>
  <circle cx="475.2" cy="325.0" r="3.5" fill="#ffffff" stroke="#2f6fdf" stroke-width="1.6"/>
  <circle cx="667.8" cy="292.4" r="3.5" fill="#ffffff" stroke="#2f6fdf" stroke-width="1.6"/>
  <circle cx="870" cy="350.5" r="3.5" fill="#ffffff" stroke="#2f6fdf" stroke-width="1.6"/>

  <polyline points="90,267.7 282.6,267.7 475.2,274.1 667.8,216.1 870,197.7" fill="none" stroke="#2f6fdf" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 5"/>
  <circle cx="90" cy="267.7" r="3.5" fill="#ffffff" stroke="#2f6fdf" stroke-width="1.6"/>
  <circle cx="282.6" cy="267.7" r="3.5" fill="#ffffff" stroke="#2f6fdf" stroke-width="1.6"/>
  <circle cx="475.2" cy="274.1" r="3.5" fill="#ffffff" stroke="#2f6fdf" stroke-width="1.6"/>
  <circle cx="667.8" cy="216.1" r="3.5" fill="#ffffff" stroke="#2f6fdf" stroke-width="1.6"/>
  <circle cx="870" cy="197.7" r="3.5" fill="#ffffff" stroke="#2f6fdf" stroke-width="1.6"/>

  <polyline points="90,146.8 282.6,369.5 475.2,337.7 667.8,242.3 870,318.6" fill="none" stroke="#2f7d65" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="90" cy="146.8" r="3.5" fill="#ffffff" stroke="#2f7d65" stroke-width="1.6"/>
  <circle cx="282.6" cy="369.5" r="3.5" fill="#ffffff" stroke="#2f7d65" stroke-width="1.6"/>
  <circle cx="475.2" cy="337.7" r="3.5" fill="#ffffff" stroke="#2f7d65" stroke-width="1.6"/>
  <circle cx="667.8" cy="242.3" r="3.5" fill="#ffffff" stroke="#2f7d65" stroke-width="1.6"/>
  <circle cx="870" cy="318.6" r="3.5" fill="#ffffff" stroke="#2f7d65" stroke-width="1.6"/>

  <polyline points="90,267.7 282.6,350.0 475.2,165.9 667.8,260.6 870,236.0" fill="none" stroke="#2f7d65" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 5"/>
  <circle cx="90" cy="267.7" r="3.5" fill="#ffffff" stroke="#2f7d65" stroke-width="1.6"/>
  <circle cx="282.6" cy="350.0" r="3.5" fill="#ffffff" stroke="#2f7d65" stroke-width="1.6"/>
  <circle cx="475.2" cy="165.9" r="3.5" fill="#ffffff" stroke="#2f7d65" stroke-width="1.6"/>
  <circle cx="667.8" cy="260.6" r="3.5" fill="#ffffff" stroke="#2f7d65" stroke-width="1.6"/>
  <circle cx="870" cy="236.0" r="3.5" fill="#ffffff" stroke="#2f7d65" stroke-width="1.6"/>

  <line x1="910" y1="142" x2="942" y2="142" stroke="#2f6fdf" stroke-width="2.8"/>
  <text x="954" y="146" class="small">binary 앞쪽 400</text>
  <line x1="910" y1="172" x2="942" y2="172" stroke="#2f6fdf" stroke-width="2.8" stroke-dasharray="7 5"/>
  <text x="954" y="176" class="small">binary 무작위 400</text>
  <line x1="910" y1="202" x2="942" y2="202" stroke="#2f7d65" stroke-width="2.8"/>
  <text x="954" y="206" class="small">dense 앞쪽 400</text>
  <line x1="910" y1="232" x2="942" y2="232" stroke="#2f7d65" stroke-width="2.8" stroke-dasharray="7 5"/>
  <text x="954" y="236" class="small">dense 무작위 400</text>

  <text x="480" y="476" text-anchor="middle" class="small">GRPO step</text>
  <text x="44" y="512" class="small">앞쪽 연속 표본은 입력 하위집단을 과표집할 수 있으므로, judge 부분표본 방식은 함께 보고해야 한다.</text>
</svg>
