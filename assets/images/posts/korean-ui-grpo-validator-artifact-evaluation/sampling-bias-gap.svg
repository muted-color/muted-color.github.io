<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
<title id="title">Judge sample sensitivity</title>
<desc id="desc">Line chart comparing public-judge gap trends for first-400 and random-400 judge samples.</desc>
<defs>
  <style>
    text { font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing: 0; }
    .title { fill: #111111; font-size: 22px; font-weight: 700; }
    .label { fill: #111111; font-size: 16px; font-weight: 700; }
    .small { fill: #5f6672; font-size: 13px; font-weight: 400; }
    .tick { fill: #5f6672; font-size: 12px; font-weight: 400; }
    .value { fill: #111111; font-size: 13px; font-weight: 700; }
    .valueOn { fill: #ffffff; font-size: 13px; font-weight: 700; }
  </style>
  <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
    <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111111" flood-opacity="0.07"/>
  </filter>
  
</defs>
<rect width="1120" height="500" fill="#ffffff"/>
<text x="54" y="70" class="title">Judge sample sensitivity</text>
<line x1="90" y1="385.0" x2="820" y2="385.0" stroke="#111111" stroke-opacity="0.09"/><text x="76" y="389.0" text-anchor="end" class="tick">0.06</text>
<line x1="90" y1="310.0" x2="820" y2="310.0" stroke="#111111" stroke-opacity="0.09"/><text x="76" y="314.0" text-anchor="end" class="tick">0.09</text>
<line x1="90" y1="235.0" x2="820" y2="235.0" stroke="#111111" stroke-opacity="0.09"/><text x="76" y="239.0" text-anchor="end" class="tick">0.12</text>
<line x1="90" y1="160.0" x2="820" y2="160.0" stroke="#111111" stroke-opacity="0.09"/><text x="76" y="164.0" text-anchor="end" class="tick">0.15</text>
<line x1="90" y1="110.0" x2="820" y2="110.0" stroke="#111111" stroke-opacity="0.09"/><text x="76" y="114.0" text-anchor="end" class="tick">0.17</text>
<text x="90.0" y="413" text-anchor="middle" class="tick">0</text>
<text x="270.2" y="413" text-anchor="middle" class="tick">200</text>
<text x="450.5" y="413" text-anchor="middle" class="tick">400</text>
<text x="630.7" y="413" text-anchor="middle" class="tick">600</text>
<text x="820.0" y="413" text-anchor="middle" class="tick">810</text>
<polyline points="90.0,140.0 270.2,252.5 450.5,317.5 630.7,285.0 820.0,342.5" fill="none" stroke="#3f41ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="90.0,257.5 270.2,257.5 450.5,265.0 630.7,207.5 820.0,190.0" fill="none" stroke="#3f41ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 6"/>
<polyline points="90.0,140.0 270.2,360.0 450.5,330.0 630.7,235.0 820.0,310.0" fill="none" stroke="#5f6672" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="90.0,257.5 270.2,340.0 450.5,157.5 630.7,250.0 820.0,230.0" fill="none" stroke="#5f6672" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 6"/>
<line x1="860" y1="130" x2="892" y2="130" stroke="#3f41ff" stroke-width="3"/><text x="904" y="134" class="small">binary first-400</text>
<line x1="860" y1="158" x2="892" y2="158" stroke="#3f41ff" stroke-width="3" stroke-dasharray="8 6"/><text x="904" y="162" class="small">binary random-400</text>
<line x1="860" y1="186" x2="892" y2="186" stroke="#5f6672" stroke-width="3"/><text x="904" y="190" class="small">dense first-400</text>
<line x1="860" y1="214" x2="892" y2="214" stroke="#5f6672" stroke-width="3" stroke-dasharray="8 6"/><text x="904" y="218" class="small">dense random-400</text>
<text x="455.0" y="472" text-anchor="middle" class="small">GRPO step</text></svg>