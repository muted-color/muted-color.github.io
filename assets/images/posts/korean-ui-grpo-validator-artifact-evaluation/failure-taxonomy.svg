<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 470" role="img" aria-labelledby="title desc">
<title id="title">Failure taxonomy</title>
<desc id="desc">Line chart showing LEN_EXCEEDED, BAD_SUFFIX, and INVALID_CATEGORY over GRPO-binary steps.</desc>
<defs>
  <style>
    text { font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing: 0; }
    .title { fill: #111111; font-size: 22px; font-weight: 700; }
    .label { fill: #111111; font-size: 16px; font-weight: 700; }
    .small { fill: #5f6672; font-size: 13px; font-weight: 400; }
    .tick { fill: #5f6672; font-size: 12px; font-weight: 400; }
    .value { fill: #111111; font-size: 13px; font-weight: 700; }
    .valueOn { fill: #ffffff; font-size: 13px; font-weight: 700; }
  </style>
  <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
    <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111111" flood-opacity="0.07"/>
  </filter>
  
</defs>
<rect width="1080" height="470" fill="#ffffff"/>
<text x="54" y="70" class="title">Failure taxonomy</text>
<line x1="96" y1="360.0" x2="860" y2="360.0" stroke="#111111" stroke-opacity="0.09"/><text x="82" y="364.0" text-anchor="end" class="tick">0.00</text>
<line x1="96" y1="268.9" x2="860" y2="268.9" stroke="#111111" stroke-opacity="0.09"/><text x="82" y="272.9" text-anchor="end" class="tick">0.20</text>
<line x1="96" y1="177.9" x2="860" y2="177.9" stroke="#111111" stroke-opacity="0.09"/><text x="82" y="181.9" text-anchor="end" class="tick">0.40</text>
<line x1="96" y1="105.0" x2="860" y2="105.0" stroke="#111111" stroke-opacity="0.09"/><text x="82" y="109.0" text-anchor="end" class="tick">0.56</text>
<text x="96.0" y="388" text-anchor="middle" class="tick">50</text>
<text x="246.8" y="388" text-anchor="middle" class="tick">200</text>
<text x="447.8" y="388" text-anchor="middle" class="tick">400</text>
<text x="648.9" y="388" text-anchor="middle" class="tick">600</text>
<text x="860.0" y="388" text-anchor="middle" class="tick">810</text>
<polyline points="96.0,114.6 146.3,181.5 246.8,237.1 347.3,244.3 447.8,251.2 548.4,243.0 648.9,252.1 749.4,259.8 860.0,257.5" fill="none" stroke="#3f41ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="96.0,227.5 146.3,227.9 246.8,233.4 347.3,229.3 447.8,226.1 548.4,228.4 648.9,240.2 749.4,237.5 860.0,234.8" fill="none" stroke="#5f6672" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="96.0,355.4 146.3,355.9 246.8,355.9 347.3,356.4 447.8,355.9 548.4,355.4 648.9,355.9 749.4,355.4 860.0,355.9" fill="none" stroke="#2529d8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 6"/>
<line x1="900" y1="130" x2="932" y2="130" stroke="#3f41ff" stroke-width="3"/><text x="944" y="134" class="small">LEN_EXCEEDED</text>
<line x1="900" y1="160" x2="932" y2="160" stroke="#5f6672" stroke-width="3"/><text x="944" y="164" class="small">BAD_SUFFIX</text>
<line x1="900" y1="190" x2="932" y2="190" stroke="#2529d8" stroke-width="3" stroke-dasharray="8 6"/><text x="944" y="194" class="small">INVALID_CAT</text>
<text x="478.0" y="442" text-anchor="middle" class="small">GRPO step</text></svg>
