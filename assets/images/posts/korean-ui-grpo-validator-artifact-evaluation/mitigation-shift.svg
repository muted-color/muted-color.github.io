<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">완화와 아티팩트 자리 이동</title>
  <desc id="desc">dense, antistuff, antistuff2의 slot stuffing, 기본 슬롯, 공개 검증 통과율을 비교한 묶음 막대 그래프.</desc>
  <defs>
