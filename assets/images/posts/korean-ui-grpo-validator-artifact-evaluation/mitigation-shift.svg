<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
<title id="title">Mitigation and relocation</title>
<desc id="desc">Grouped bar comparison for dense, antistuff, and antistuff2.</desc>
<defs>
  <style>
    text { font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing: 0; }
    .title { fill: #111111; font-size: 22px; font-weight: 700; }
    .label { fill: #111111; font-size: 16px; font-weight: 700; }
    .small { fill: #5f6672; font-size: 13px; font-weight: 400; }
    .tick { fill: #5f6672; font-size: 12px; font-weight: 400; }
    .value { fill: #111111; font-size: 13px; font-weight: 700; }
    .valueOn { fill: #ffffff; font-size: 13px; font-weight: 700; }
  </style>
  <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
    <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111111" flood-opacity="0.07"/>
  </filter>
  
</defs>
<rect width="900" height="430" fill="#ffffff"/>
<text x="54" y="70" class="title">Mitigation and relocation</text>
<text x="269.0" y="112" text-anchor="middle" class="label">dense</text>
<text x="439.0" y="112" text-anchor="middle" class="label">antistuff</text>
<text x="609.0" y="112" text-anchor="middle" class="label">antistuff2</text>
<text x="54" y="150" class="label">slot_stuffing</text>
<text x="54" y="172" class="tick">lower is better</text>
<rect x="210" y="130" width="118" height="26" rx="6" fill="#f8f9fc" stroke="#111111" stroke-opacity="0.11"/>
<rect x="210" y="130" width="105.1" height="26" rx="6" fill="#2529d8" opacity="0.88"/>
<text x="307.1" y="148" text-anchor="end" class="valueOn">0.668</text>
<rect x="380" y="130" width="118" height="26" rx="6" fill="#f8f9fc" stroke="#111111" stroke-opacity="0.11"/>
<rect x="380" y="130" width="2.4" height="26" rx="6" fill="#2529d8" opacity="0.88"/>
<text x="439.0" y="148" text-anchor="middle" class="value">0.016</text>
<rect x="550" y="130" width="118" height="26" rx="6" fill="#f8f9fc" stroke="#111111" stroke-opacity="0.11"/>
<rect x="550" y="130" width="22.2" height="26" rx="6" fill="#2529d8" opacity="0.88"/>
<text x="609.0" y="148" text-anchor="middle" class="value">0.141</text>
<text x="54" y="226" class="label">default_slot_rate</text>
<text x="54" y="248" class="tick">lower is better</text>
<rect x="210" y="206" width="118" height="26" rx="6" fill="#f8f9fc" stroke="#111111" stroke-opacity="0.11"/>
<rect x="210" y="206" width="8.8" height="26" rx="6" fill="#5f6672" opacity="0.88"/>
<text x="269.0" y="224" text-anchor="middle" class="value">0.056</text>
<rect x="380" y="206" width="118" height="26" rx="6" fill="#f8f9fc" stroke="#111111" stroke-opacity="0.11"/>
<rect x="380" y="206" width="54.3" height="26" rx="6" fill="#5f6672" opacity="0.88"/>
<text x="439.0" y="224" text-anchor="middle" class="value">0.345</text>
<rect x="550" y="206" width="118" height="26" rx="6" fill="#f8f9fc" stroke="#111111" stroke-opacity="0.11"/>
<rect x="550" y="206" width="10.7" height="26" rx="6" fill="#5f6672" opacity="0.88"/>
<text x="609.0" y="224" text-anchor="middle" class="value">0.068</text>
<text x="54" y="302" class="label">public_pass</text>
<text x="54" y="324" class="tick">higher is better</text>
<rect x="210" y="282" width="118" height="26" rx="6" fill="#f8f9fc" stroke="#111111" stroke-opacity="0.11"/>
<rect x="210" y="282" width="105.3" height="26" rx="6" fill="#3f41ff" opacity="0.88"/>
<text x="307.3" y="300" text-anchor="end" class="valueOn">0.669</text>
<rect x="380" y="282" width="118" height="26" rx="6" fill="#f8f9fc" stroke="#111111" stroke-opacity="0.11"/>
<rect x="380" y="282" width="109.2" height="26" rx="6" fill="#3f41ff" opacity="0.88"/>
<text x="481.2" y="300" text-anchor="end" class="valueOn">0.694</text>
<rect x="550" y="282" width="118" height="26" rx="6" fill="#f8f9fc" stroke="#111111" stroke-opacity="0.11"/>
<rect x="550" y="282" width="101.8" height="26" rx="6" fill="#3f41ff" opacity="0.88"/>
<text x="643.8" y="300" text-anchor="end" class="valueOn">0.647</text>
</svg>
