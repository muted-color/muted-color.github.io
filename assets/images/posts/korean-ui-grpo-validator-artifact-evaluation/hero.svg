<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">GRPO format repair and structural artifact evaluation</title>
  <desc id="desc">A clean dashboard-style figure comparing format recovery, slot stuffing, mitigation relocation, and signal separation for GRPO format repair after DPO.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8f9fc"/>
    </linearGradient>
    <radialGradient id="dots-tl-fade" cx="18%" cy="22%" r="42%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="0.48" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dots-br-fade" cx="80%" cy="78%" r="44%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.84"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <mask id="dots-tl-mask">
      <rect width="1200" height="675" fill="url(#dots-tl-fade)"/>
    </mask>
    <mask id="dots-br-mask">
      <rect width="1200" height="675" fill="url(#dots-br-fade)"/>
    </mask>
    <pattern id="signal-dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="1.15" fill="#3f41ff"/>
    </pattern>
    <pattern id="signal-dots-tight" width="17" height="17" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.25" fill="#3f41ff"/>
    </pattern>
    <pattern id="signal-dots-warm" width="21" height="21" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1.15" fill="#2529d8"/>
    </pattern>
    <pattern id="signal-dots-secondary" width="54" height="54" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.6" fill="#3f41ff"/>
      <circle cx="36" cy="30" r="1.05" fill="#5f6672"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111111" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#signal-dots)" opacity="0.16"/>
  <rect width="1200" height="675" fill="url(#signal-dots-tight)" opacity="0.48" mask="url(#dots-tl-mask)"/>
  <rect width="1200" height="675" fill="url(#signal-dots-tight)" opacity="0.30" transform="translate(9 9)" mask="url(#dots-tl-mask)"/>
  <rect width="1200" height="675" fill="url(#signal-dots-tight)" opacity="0.38" transform="translate(7 4)" mask="url(#dots-br-mask)"/>
  <rect width="1200" height="675" fill="url(#signal-dots-warm)" opacity="0.26" transform="translate(3 11)" mask="url(#dots-br-mask)"/>
  <rect width="1200" height="675" fill="url(#signal-dots-secondary)" opacity="0.22" transform="translate(13 7)" mask="url(#dots-tl-mask)"/>
  <rect width="1200" height="675" fill="url(#signal-dots-secondary)" opacity="0.18" transform="translate(31 19)" mask="url(#dots-br-mask)"/>

  <g transform="translate(95 168)">
    <text x="0" y="0" fill="#111111" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">GRPO Format Repair and Structural Artifact Evaluation</text>
  </g>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <g transform="translate(95 270)">
      <rect width="310" height="210" rx="18" fill="#ffffff" stroke="#3f41ff" stroke-opacity="0.24"/>
      <text x="28" y="46" fill="#111111" font-size="18" font-weight="700">Partial format recovery</text>
      <text x="28" y="76" fill="#5f6672" font-size="14">public validator pass</text>
      <text x="28" y="132" fill="#111111" font-size="38" font-weight="700">0.389 -> 0.694</text>
      <text x="28" y="170" fill="#5f6672" font-size="14">DPO to antistuff; below SFT</text>
    </g>

    <g transform="translate(445 270)">
      <rect width="310" height="210" rx="18" fill="#ffffff" stroke="#3f41ff" stroke-opacity="0.24"/>
      <text x="28" y="46" fill="#111111" font-size="18" font-weight="700">Structural artifact</text>
      <text x="28" y="76" fill="#5f6672" font-size="14">slot stuffing rises</text>
      <text x="28" y="132" fill="#111111" font-size="38" font-weight="700">0.218 -> 0.668</text>
      <text x="28" y="170" fill="#5f6672" font-size="14">DPO to GRPO-dense</text>
    </g>

    <g transform="translate(795 270)">
      <rect width="310" height="210" rx="18" fill="#ffffff" stroke="#2529d8" stroke-opacity="0.28"/>
      <text x="28" y="46" fill="#111111" font-size="18" font-weight="700">Mitigation check</text>
      <text x="28" y="76" fill="#5f6672" font-size="14">anti-stuffing penalty</text>
      <text x="28" y="132" fill="#111111" font-size="38" font-weight="700">0.668 -> 0.016</text>
      <text x="28" y="170" fill="#5f6672" font-size="14">stuffing falls; default slots checked</text>
    </g>

    <g transform="translate(95 520)">
      <line x1="0" y1="0" x2="1010" y2="0" stroke="#111111" stroke-opacity="0.12" stroke-width="1.5"/>
      <text x="0" y="36" fill="#111111" font-size="18" font-weight="700">Core takeaway</text>
      <text x="0" y="58" fill="#5f6672" font-size="14">format recovers while quality proxy holds</text>
      <text x="0" y="76" fill="#5f6672" font-size="14">structural artifacts move separately</text>
      <g transform="translate(650 33)">
        <circle cx="0" cy="0" r="4" fill="#3f41ff"/>
        <text x="16" y="5" fill="#111111" font-size="13" font-weight="700">NLL holds</text>
        <circle cx="126" cy="0" r="4" fill="#3f41ff"/>
        <text x="142" y="5" fill="#111111" font-size="13" font-weight="700">stuffing rises</text>
        <circle cx="276" cy="0" r="4" fill="#2529d8"/>
        <text x="292" y="5" fill="#111111" font-size="13" font-weight="700">artifacts shift</text>
      </g>
    </g>
  </g>
</svg>
