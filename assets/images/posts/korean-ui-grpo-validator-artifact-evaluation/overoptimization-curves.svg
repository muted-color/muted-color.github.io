<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
<title id="title">Validator signal curves</title>
<desc id="desc">Line chart showing GRPO metrics over training steps.</desc>
<defs>
  <style>
    text { font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing: 0; }
    .title { fill: #111111; font-size: 22px; font-weight: 700; }
    .label { fill: #111111; font-size: 16px; font-weight: 700; }
    .small { fill: #5f6672; font-size: 13px; font-weight: 400; }
    .tick { fill: #5f6672; font-size: 12px; font-weight: 400; }
    .value { fill: #111111; font-size: 13px; font-weight: 700; }
    .valueOn { fill: #ffffff; font-size: 13px; font-weight: 700; }
  </style>
  <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
    <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111111" flood-opacity="0.07"/>
  </filter>
  
</defs>
<rect width="1180" height="620" fill="#ffffff"/>
<text x="54" y="70" class="title">Validator signal curves</text>
<line x1="95" y1="500.0" x2="980" y2="500.0" stroke="#111111" stroke-opacity="0.09"/><text x="81" y="504.0" text-anchor="end" class="tick">0.0</text>
<line x1="95" y1="395.8" x2="980" y2="395.8" stroke="#111111" stroke-opacity="0.09"/><text x="81" y="399.8" text-anchor="end" class="tick">0.2</text>
<line x1="95" y1="291.7" x2="980" y2="291.7" stroke="#111111" stroke-opacity="0.09"/><text x="81" y="295.7" text-anchor="end" class="tick">0.4</text>
<line x1="95" y1="187.5" x2="980" y2="187.5" stroke="#111111" stroke-opacity="0.09"/><text x="81" y="191.5" text-anchor="end" class="tick">0.6</text>
<text x="95.0" y="528" text-anchor="middle" class="tick">0</text>
<text x="313.5" y="528" text-anchor="middle" class="tick">200</text>
<text x="532.0" y="528" text-anchor="middle" class="tick">400</text>
<text x="750.6" y="528" text-anchor="middle" class="tick">600</text>
<text x="980.0" y="528" text-anchor="middle" class="tick">810</text>
<polyline points="95.0,289.6 149.6,285.4 204.3,245.8 313.5,203.1 422.8,201.0 532.0,196.4 641.3,199.0 750.6,182.3 859.8,182.8 980.0,194.3" fill="none" stroke="#3f41ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="95.0,347.9 149.6,328.1 204.3,312.5 313.5,247.4 422.8,278.6 532.0,264.1 641.3,255.2 750.6,255.2 859.8,225.5 980.0,260.4" fill="none" stroke="#5f6672" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<polyline points="95.0,289.6 149.6,259.9 204.3,232.8 313.5,203.1 422.8,180.7 532.0,178.1 641.3,167.2 750.6,149.5 859.8,149.5 980.0,151.6" fill="none" stroke="#3f41ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 6"/>
<polyline points="95.0,347.9 149.6,324.0 204.3,305.7 313.5,226.6 422.8,226.6 532.0,268.2 641.3,230.2 750.6,228.6 859.8,212.0 980.0,230.7" fill="none" stroke="#5f6672" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 6"/>
<polyline points="95.0,390.6 149.6,378.6 204.3,347.4 313.5,265.6 422.8,198.4 532.0,178.1 641.3,158.3 750.6,154.2 859.8,156.2 980.0,155.7" fill="none" stroke="#16a3c7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
<line x1="1000" y1="142" x2="1034" y2="142" stroke="#3f41ff" stroke-width="3"/><text x="1046" y="146" class="tick">binary public</text>
<line x1="1000" y1="170" x2="1034" y2="170" stroke="#5f6672" stroke-width="3"/><text x="1046" y="174" class="tick">binary hidden</text>
<line x1="1000" y1="198" x2="1034" y2="198" stroke="#3f41ff" stroke-width="3" stroke-dasharray="8 6"/><text x="1046" y="202" class="tick">dense public</text>
<line x1="1000" y1="226" x2="1034" y2="226" stroke="#5f6672" stroke-width="3" stroke-dasharray="8 6"/><text x="1046" y="230" class="tick">dense hidden</text>
<line x1="1000" y1="254" x2="1034" y2="254" stroke="#16a3c7" stroke-width="3"/><text x="1046" y="258" class="tick">slot stuffing</text>
<text x="537.5" y="586" text-anchor="middle" class="small">GRPO step</text></svg>
