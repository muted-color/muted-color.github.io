<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">Raw and residual OpenBind affinity score comparison</title>
  <desc id="desc">Horizontal bar chart comparing raw pKD Spearman and MW+cLogP residual Spearman for same-campaign ligand-only controls, property baselines, and published prediction files.</desc>
  <rect width="1120" height="650" fill="#ffffff"/>
  <defs>
    <pattern id="control-stripe" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#3f41ff"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#ffffff" stroke-width="2.2" opacity="0.45"/>
    </pattern>
    <style>
      text { font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .title { fill: #111111; font-size: 15px; font-weight: 700; }
      .method { fill: #111111; font-size: 12.5px; font-weight: 650; }
      .role { fill: #5f6672; font-size: 9.6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
      .tick { fill: #5f6672; font-size: 12px; font-weight: 500; }
      .axis-label { fill: #5f6672; font-size: 12.5px; font-weight: 600; }
      .grid { stroke: #e6e8ee; stroke-width: 1; stroke-dasharray: 4 8; }
      .axis { stroke: #cfd4dd; stroke-width: 1.2; }
      .zero { stroke: #5f6672; stroke-width: 1.35; }
      .raw { fill: #eef0ff; stroke: #3f41ff; stroke-width: 1.4; }
      .res-control { fill: url(#control-stripe); }
      .res-property { fill: #b9c0cc; }
      .res-published { fill: #7f8796; }
      .divider { stroke: #e6e8ee; stroke-width: 1; }
      .legend { fill: #5f6672; font-size: 11.5px; font-weight: 600; }
    </style>
  </defs>
  <text x="560" y="42" text-anchor="middle" class="title">Raw pKD correlation is not the residual signal</text>
  <rect x="500" y="76" width="18" height="10" rx="3" class="raw"/>
  <text x="526" y="86" class="legend">raw pKD</text>
  <rect x="598" y="76" width="18" height="10" rx="3" class="res-control"/>
  <text x="624" y="86" class="legend">ligand-only residual</text>
  <rect x="764" y="76" width="18" height="10" rx="3" class="res-published"/>
  <text x="790" y="86" class="legend">published residual</text>
  <text x="287.6" y="584" text-anchor="middle" class="tick">-0.1</text>
  <line x1="375.7" y1="98" x2="375.7" y2="556" class="zero"/>
  <text x="375.7" y="584" text-anchor="middle" class="tick">0</text>
  <line x1="463.8" y1="98" x2="463.8" y2="556" class="grid"/>
  <text x="463.8" y="584" text-anchor="middle" class="tick">0.1</text>
  <line x1="640.0" y1="98" x2="640.0" y2="556" class="grid"/>
  <text x="640.0" y="584" text-anchor="middle" class="tick">0.3</text>
  <line x1="816.2" y1="98" x2="816.2" y2="556" class="grid"/>
  <text x="816.2" y="584" text-anchor="middle" class="tick">0.5</text>
  <text x="992.4" y="584" text-anchor="middle" class="tick">0.7</text>
  <line x1="270" y1="556" x2="1010" y2="556" class="axis"/>
  <line x1="174" y1="112" x2="174" y2="552" class="divider"/>
  <text x="640.0" y="620" text-anchor="middle" class="axis-label">Spearman correlation</text>
  <text x="48" y="163.0" class="role">SAME-CAMPAIGN</text>
  <text x="48" y="176.0" class="role">CONTROLS</text>
  <text x="196" y="130" class="method">ECFP ridge</text>
  <rect x="375.7" y="114" width="591.8" height="11" rx="4" class="raw"/>
  <rect x="375.7" y="130" width="379.1" height="11" rx="4" class="res-control"/>
  <text x="196" y="168" class="method">RDKit RF</text>
  <rect x="375.7" y="152" width="552.7" height="11" rx="4" class="raw"/>
  <rect x="375.7" y="168" width="297.0" height="11" rx="4" class="res-control"/>
  <text x="196" y="206" class="method">RDKit ridge</text>
  <rect x="375.7" y="190" width="533.4" height="11" rx="4" class="raw"/>
  <rect x="375.7" y="206" width="232.9" height="11" rx="4" class="res-control"/>
  <text x="48" y="277.0" class="role">PROPERTY</text>
  <text x="48" y="290.0" class="role">BASELINES</text>
  <line x1="48" y1="222" x2="1010" y2="222" class="divider"/>
  <text x="196" y="244" class="method">molecular weight</text>
  <rect x="375.7" y="228" width="426.0" height="11" rx="4" class="raw"/>
  <rect x="360.3" y="244" width="15.4" height="11" rx="4" class="res-property"/>
  <text x="196" y="282" class="method">MW+cLogP ridge</text>
  <rect x="375.7" y="266" width="426.0" height="11" rx="4" class="raw"/>
  <rect x="357.7" y="282" width="18.0" height="11" rx="4" class="res-property"/>
  <text x="196" y="320" class="method">cLogP</text>
  <rect x="375.7" y="304" width="153.4" height="11" rx="4" class="raw"/>
  <rect x="375.7" y="320" width="12.5" height="11" rx="4" class="res-property"/>
  <text x="48" y="440.0" class="role">PUBLISHED</text>
  <text x="48" y="453.0" class="role">PREDICTION FILES</text>
  <line x1="48" y1="336" x2="1010" y2="336" class="divider"/>
  <text x="196" y="358" class="method">gnina crystal</text>
  <rect x="375.7" y="342" width="399.4" height="11" rx="4" class="raw"/>
  <rect x="375.7" y="358" width="16.1" height="11" rx="4" class="res-published"/>
  <text x="196" y="396" class="method">Boltz-2</text>
  <rect x="375.7" y="380" width="350.0" height="11" rx="4" class="raw"/>
  <rect x="375.7" y="396" width="85.3" height="11" rx="4" class="res-published"/>
  <text x="196" y="434" class="method">smina crystal</text>
  <rect x="375.7" y="418" width="224.2" height="11" rx="4" class="raw"/>
  <rect x="375.7" y="434" width="33.7" height="11" rx="4" class="res-published"/>
  <text x="196" y="472" class="method">AEV-PLIG</text>
  <rect x="375.7" y="456" width="200.1" height="11" rx="4" class="raw"/>
  <rect x="300.6" y="472" width="75.1" height="11" rx="4" class="res-published"/>
  <text x="196" y="510" class="method">AqAffinity</text>
  <rect x="375.7" y="494" width="103.3" height="11" rx="4" class="raw"/>
  <rect x="325.4" y="510" width="50.3" height="11" rx="4" class="res-published"/>
</svg>
