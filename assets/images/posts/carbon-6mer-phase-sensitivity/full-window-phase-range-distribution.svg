<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="560" viewBox="0 0 1060 560" role="img" aria-labelledby="title desc">
  <title id="title">Full-window phase range distribution</title>
  <desc id="desc">Each point in the ranked curve is one BRCA2 variant. The value is that variant's six-phase score range divided by the full-window score IQR. 498 variants are at or above the 0.10 material threshold.</desc>
  <rect width="1060" height="560" fill="#ffffff"/>
  <defs><style>

      text { font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .title { fill: #111111; font-size: 18px; font-weight: 760; }
      .label { fill: #111111; font-size: 13px; font-weight: 700; }
      .small { fill: #5f6672; font-size: 11px; font-weight: 560; }
      .value { fill: #111111; font-size: 12px; font-weight: 760; }
      .axis { stroke: #cfd4dd; stroke-width: 1.25; }
      .grid { stroke: #e8ebf1; stroke-width: 1; stroke-dasharray: 4 8; }
      .curve { fill: none; stroke: #3f41ff; stroke-width: 2.4; }
      .area { fill: #E9EBFC; opacity: 0.84; }
      .threshold { stroke: #2b3038; stroke-width: 1.45; stroke-dasharray: 5 6; }
      .marker { stroke: #3f41ff; stroke-width: 1.7; stroke-dasharray: 3 5; }
      .dot { fill: #3f41ff; }
  </style></defs>
