<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Edge context control histogram</title>
  <desc id="desc">Histogram of shifted-reference edge-only score range, with callout noting median edge-over-full range ratio and fraction where edge range is at least full-window range.</desc>
  <rect width="980" height="520" fill="#ffffff"/>
  <defs>
    <style>
      text { font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .title { fill: #111111; font-size: 17px; font-weight: 740; }
      .label { fill: #111111; font-size: 12.5px; font-weight: 680; }
      .small { fill: #5f6672; font-size: 10.5px; font-weight: 560; }
      .tiny { fill: #5f6672; font-size: 9.5px; font-weight: 560; }
      .value { fill: #111111; font-size: 12px; font-weight: 740; }
      .axis { stroke: #cfd4dd; stroke-width: 1.2; }
      .grid { stroke: #e8ebf1; stroke-width: 1; stroke-dasharray: 4 8; }
      .threshold { stroke: #2b3038; stroke-width: 1.3; stroke-dasharray: 5 6; }
      .card { fill: #f7f9fc; stroke: #dfe4ed; stroke-width: 1; }
      .token { fill: #3f41ff; }
      .fns { fill: #56b39d; }
      .gray { fill: #9aa1ad; }
      .box { fill: #eef2ff; stroke: #3f41ff; stroke-width: 1.4; }
      .median { stroke: #3f41ff; stroke-width: 2.2; }
      .whisker { stroke: #6b7280; stroke-width: 1.35; }
      .dot { fill: #3f41ff; opacity: 0.18; }
    </style>
    
  </defs>
<text x="490" y="42" text-anchor="middle" class="title">Window edge/context drift remains as a separate caution</text>
<line x1="100" y1="410.0" x2="900" y2="410.0" class="grid"/>
