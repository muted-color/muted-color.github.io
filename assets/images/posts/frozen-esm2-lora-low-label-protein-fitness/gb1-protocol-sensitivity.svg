<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 460" role="img" aria-labelledby="title desc">
  <title id="title">GB1 delta by batch size</title>
  <desc id="desc">A grouped vertical bar plot compares LoRA minus frozen Spearman deltas for batch size 8 and batch size 32 at budgets 128, 192, and 256.</desc>
  <rect width="1040" height="460" fill="#ffffff"/>

  <defs>
    <pattern id="batch32-hatch" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="5" fill="#eef0ff"/>
      <path d="M-1 -1 L6 6 M6 -1 L-1 6" stroke="#3f41ff" stroke-width="1" opacity="0.62"/>
    </pattern>
  </defs>

  <g font-family="Plus Jakarta Sans, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <g transform="translate(132 60)">
      <text x="360" y="0" text-anchor="middle" font-size="15" font-weight="700" fill="#111111">GB1 LoRA - Frozen Delta</text>

      <g transform="translate(0 28)">
        <g stroke="#e6e8ee" stroke-width="1">
          <line x1="0" y1="14" x2="720" y2="14" stroke-dasharray="4 8"/>
          <line x1="0" y1="89" x2="720" y2="89" stroke-dasharray="4 8"/>
          <line x1="0" y1="164" x2="720" y2="164" stroke-dasharray="4 8"/>
          <line x1="0" y1="239" x2="720" y2="239"/>
          <line x1="0" y1="269" x2="720" y2="269" stroke-dasharray="4 8"/>
          <line x1="0" y1="14" x2="0" y2="269"/>
        </g>

        <g fill="#5f6672" font-size="12" font-weight="500">
          <text x="-15" y="18" text-anchor="end">+0.15</text>
          <text x="-15" y="93" text-anchor="end">+0.10</text>
          <text x="-15" y="168" text-anchor="end">+0.05</text>
          <text x="-15" y="243" text-anchor="end">0</text>
          <text x="-15" y="273" text-anchor="end">-0.02</text>
          <text x="135" y="301" text-anchor="middle">b128</text>
          <text x="375" y="301" text-anchor="middle">b192</text>
          <text x="615" y="301" text-anchor="middle">b256</text>
        </g>

        <g>
          <rect x="96" y="169" width="34" height="70" rx="7" fill="#3f41ff"/>
          <rect x="140" y="239" width="34" height="13" rx="7" fill="url(#batch32-hatch)" stroke="#3f41ff" stroke-width="0.9"/>
          <text x="113" y="159" text-anchor="middle" font-size="13" font-weight="700" fill="#3f41ff">+0.047</text>
          <text x="157" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#5f6672">-0.009</text>

          <rect x="336" y="127" width="34" height="112" rx="7" fill="#3f41ff"/>
          <rect x="380" y="239" width="34" height="13" rx="7" fill="url(#batch32-hatch)" stroke="#3f41ff" stroke-width="0.9"/>
          <text x="353" y="117" text-anchor="middle" font-size="13" font-weight="700" fill="#3f41ff">+0.075</text>
          <text x="397" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#5f6672">-0.009</text>

          <rect x="576" y="28" width="34" height="211" rx="7" fill="#3f41ff"/>
          <rect x="620" y="139" width="34" height="100" rx="7" fill="url(#batch32-hatch)" stroke="#3f41ff" stroke-width="0.9"/>
          <text x="593" y="18" text-anchor="middle" font-size="13" font-weight="700" fill="#3f41ff">+0.140</text>
          <text x="637" y="129" text-anchor="middle" font-size="13" font-weight="700" fill="#3f41ff">+0.067</text>
        </g>
      </g>
    </g>

    <g transform="translate(382 420)" font-size="14" font-weight="500" fill="#111111">
      <rect x="0" y="-9" width="18" height="14" rx="4" fill="#3f41ff"/>
      <text x="30" y="3">batch size 8</text>
      <rect x="156" y="-9" width="18" height="14" rx="4" fill="url(#batch32-hatch)" stroke="#3f41ff" stroke-width="0.9"/>
      <text x="186" y="3">batch size 32</text>
    </g>
  </g>
</svg>
