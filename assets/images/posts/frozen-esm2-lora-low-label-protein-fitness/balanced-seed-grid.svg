<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 420" role="img" aria-labelledby="title desc">
  <title id="title">Balanced seed grid</title>
  <desc id="desc">A three by three grid crosses budget seeds 0, 1, and 2 with training seeds 0, 1, and 2.</desc>
  <rect width="1040" height="420" fill="#ffffff"/>

  <defs>
    <pattern id="seed-hatch" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="5" fill="#eef0ff"/>
      <path d="M-1 -1 L6 6 M6 -1 L-1 6" stroke="#3f41ff" stroke-width="1" opacity="0.62"/>
    </pattern>
  </defs>

  <g font-family="Plus Jakarta Sans, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <g transform="translate(332 62)">
      <text x="180" y="0" text-anchor="middle" font-size="15" font-weight="700" fill="#111111">Balanced Seed Grid</text>

      <g transform="translate(0 44)">
        <g stroke="#e6e8ee" stroke-width="1">
          <line x1="0" y1="0" x2="360" y2="0"/>
          <line x1="0" y1="80" x2="360" y2="80" stroke-dasharray="4 8"/>
          <line x1="0" y1="160" x2="360" y2="160" stroke-dasharray="4 8"/>
          <line x1="0" y1="240" x2="360" y2="240"/>
          <line x1="0" y1="0" x2="0" y2="240"/>
          <line x1="120" y1="0" x2="120" y2="240" stroke-dasharray="4 8"/>
          <line x1="240" y1="0" x2="240" y2="240" stroke-dasharray="4 8"/>
          <line x1="360" y1="0" x2="360" y2="240"/>
        </g>

        <g fill="#5f6672" font-size="12" font-weight="500">
          <text x="60" y="-18" text-anchor="middle">budget 0</text>
          <text x="180" y="-18" text-anchor="middle">budget 1</text>
          <text x="300" y="-18" text-anchor="middle">budget 2</text>
          <text x="-22" y="44" text-anchor="end">train 0</text>
          <text x="-22" y="124" text-anchor="end">train 1</text>
          <text x="-22" y="204" text-anchor="end">train 2</text>
        </g>

        <g>
          <circle cx="60" cy="40" r="17" fill="#3f41ff"/>
          <circle cx="180" cy="40" r="17" fill="url(#seed-hatch)" stroke="#3f41ff" stroke-width="1.1"/>
          <circle cx="300" cy="40" r="17" fill="#ffffff" stroke="#3f41ff" stroke-width="2"/>
          <circle cx="60" cy="120" r="17" fill="url(#seed-hatch)" stroke="#3f41ff" stroke-width="1.1"/>
          <circle cx="180" cy="120" r="17" fill="#3f41ff"/>
          <circle cx="300" cy="120" r="17" fill="url(#seed-hatch)" stroke="#3f41ff" stroke-width="1.1"/>
          <circle cx="60" cy="200" r="17" fill="#ffffff" stroke="#3f41ff" stroke-width="2"/>
          <circle cx="180" cy="200" r="17" fill="url(#seed-hatch)" stroke="#3f41ff" stroke-width="1.1"/>
          <circle cx="300" cy="200" r="17" fill="#3f41ff"/>
        </g>
      </g>
    </g>

  </g>
</svg>
