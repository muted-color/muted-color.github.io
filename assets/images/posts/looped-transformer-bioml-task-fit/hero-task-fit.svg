<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Looped Transformer BioML task-fit schematic</title>
  <desc id="desc">A text-free schematic showing a recurrent loop, a narrow task-fit gate, and a fold-like sequence trace on a clean light background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset="1" stop-color="#f7f9fc"/>
    </linearGradient>
    <linearGradient id="blueGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#dfe9ff" stop-opacity="0.46"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#5b6680" flood-opacity="0.10"/>
    </filter>
  </defs>

