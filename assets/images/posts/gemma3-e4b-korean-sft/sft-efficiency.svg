<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 420" role="img" aria-labelledby="title desc">
  <title id="title">SFT loss sanity check and runtime comparison</title>
  <desc id="desc">A two-panel plot comparing Gemma4 and Gemma3 in 100-step QLoRA SFT runs. The left panel shows remaining step loss after 100 steps as a percentage of the first step loss. The right panel shows runtime in minutes.</desc>
  <rect width="1040" height="420" fill="#ffffff"/>

  <defs>
    <pattern id="gemma3-hatch" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="5" fill="#eef0ff"/>
      <path d="M-1 -1 L6 6 M6 -1 L-1 6" stroke="#3f41ff" stroke-width="1" opacity="0.62"/>
    </pattern>
  </defs>

  <g font-family="Plus Jakarta Sans, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <g transform="translate(96 62)">
      <text x="180" y="0" text-anchor="middle" font-size="15" font-weight="700" fill="#111111">Loss Remaining</text>

      <g transform="translate(0 26)">
        <g stroke="#e6e8ee" stroke-width="1">
          <line x1="0" y1="220" x2="360" y2="220"/>
          <line x1="0" y1="146.7" x2="360" y2="146.7" stroke-dasharray="4 8"/>
          <line x1="0" y1="73.3" x2="360" y2="73.3" stroke-dasharray="4 8"/>
          <line x1="0" y1="0" x2="360" y2="0" stroke-dasharray="4 8"/>
          <line x1="0" y1="0" x2="0" y2="220"/>
        </g>

        <g fill="#5f6672" font-size="12" font-weight="500">
          <text x="-15" y="224" text-anchor="end">0%</text>
          <text x="-15" y="150.7" text-anchor="end">5%</text>
          <text x="-15" y="77.3" text-anchor="end">10%</text>
          <text x="-15" y="4" text-anchor="end">15%</text>
          <text x="60" y="252" text-anchor="middle">single</text>
          <text x="180" y="252" text-anchor="middle">multi</text>
          <text x="300" y="252" text-anchor="middle">duplicate</text>
        </g>

        <g>
          <rect x="37" y="181.62" width="24" height="38.38" rx="7" fill="#3f41ff"/>
          <rect x="69" y="206.45" width="24" height="13.55" rx="7" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="0.9"/>

          <rect x="157" y="109.74" width="24" height="110.26" rx="7" fill="#3f41ff"/>
          <rect x="189" y="23.29" width="24" height="196.71" rx="7" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="0.9"/>

          <rect x="277" y="174.78" width="24" height="45.22" rx="7" fill="#3f41ff"/>
          <rect x="309" y="207.02" width="24" height="12.98" rx="7" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="0.9"/>
        </g>
      </g>
    </g>

    <g transform="translate(590 62)">
      <text x="180" y="0" text-anchor="middle" font-size="15" font-weight="700" fill="#111111">Runtime</text>

      <g transform="translate(0 26)">
        <g stroke="#e6e8ee" stroke-width="1">
          <line x1="78" y1="0" x2="78" y2="220"/>
          <line x1="172" y1="0" x2="172" y2="220" stroke-dasharray="4 8"/>
          <line x1="266" y1="0" x2="266" y2="220" stroke-dasharray="4 8"/>
          <line x1="360" y1="0" x2="360" y2="220" stroke-dasharray="4 8"/>
          <line x1="78" y1="220" x2="360" y2="220"/>
        </g>

        <g fill="#5f6672" font-size="12" font-weight="500">
          <text x="0" y="51" text-anchor="start">single</text>
          <text x="0" y="118" text-anchor="start">multi</text>
          <text x="0" y="185" text-anchor="start">duplicate</text>
          <text x="78" y="252" text-anchor="middle">0m</text>
          <text x="172" y="252" text-anchor="middle">15m</text>
          <text x="266" y="252" text-anchor="middle">30m</text>
          <text x="360" y="252" text-anchor="middle">45m</text>
        </g>

        <g>
          <rect x="78" y="29" width="140.8" height="14" rx="7" fill="#3f41ff"/>
          <rect x="78" y="51" width="251.8" height="14" rx="7" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="0.9"/>

          <rect x="78" y="96" width="149" height="14" rx="7" fill="#3f41ff"/>
          <rect x="78" y="118" width="280.1" height="14" rx="7" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="0.9"/>

          <rect x="78" y="163" width="157.7" height="14" rx="7" fill="#3f41ff"/>
          <rect x="78" y="185" width="280.3" height="14" rx="7" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="0.9"/>
        </g>
      </g>
    </g>

    <g transform="translate(389 374)" font-size="14" font-weight="500" fill="#111111">
      <rect x="0" y="-9" width="18" height="14" rx="4" fill="#3f41ff"/>
      <text x="30" y="3">Gemma4</text>
      <rect x="148" y="-9" width="18" height="14" rx="4" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="0.9"/>
      <text x="178" y="3">Gemma3</text>
    </g>
  </g>
</svg>
