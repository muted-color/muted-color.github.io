<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 420" role="img" aria-labelledby="title desc">
  <title id="title">Judge win and ROUGE-L across QLoRA SFT steps</title>
  <desc id="desc">A two-panel line plot comparing Gemma4 and Gemma3 across base, step50, step200, and step500. The left panel shows LLM Judge win rate, and the right panel shows ROUGE-L.</desc>
  <rect width="1040" height="420" fill="#ffffff"/>

  <defs>
    <pattern id="gemma3-hatch" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="5" fill="#eef0ff"/>
      <path d="M-1 -1 L6 6 M6 -1 L-1 6" stroke="#3f41ff" stroke-width="1" opacity="0.62"/>
    </pattern>
  </defs>

  <g font-family="Plus Jakarta Sans, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <g transform="translate(96 62)">
      <text x="180" y="0" text-anchor="middle" font-size="15" font-weight="700" fill="#111111">LLM Judge Win</text>

      <g transform="translate(0 26)">
        <g stroke="#e6e8ee" stroke-width="1">
          <line x1="0" y1="220" x2="360" y2="220"/>
          <line x1="0" y1="165" x2="360" y2="165" stroke-dasharray="4 8"/>
          <line x1="0" y1="110" x2="360" y2="110" stroke-dasharray="4 8"/>
          <line x1="0" y1="55" x2="360" y2="55" stroke-dasharray="4 8"/>
          <line x1="0" y1="0" x2="360" y2="0" stroke-dasharray="4 8"/>
          <line x1="0" y1="0" x2="0" y2="220"/>
        </g>

        <g fill="#5f6672" font-size="12" font-weight="500">
          <text x="-15" y="224" text-anchor="end">0.00</text>
          <text x="-15" y="169" text-anchor="end">0.25</text>
          <text x="-15" y="114" text-anchor="end">0.50</text>
          <text x="-15" y="59" text-anchor="end">0.75</text>
          <text x="-15" y="4" text-anchor="end">1.00</text>
          <text x="0" y="252" text-anchor="middle">base</text>
          <text x="120" y="252" text-anchor="middle">step50</text>
          <text x="240" y="252" text-anchor="middle">step200</text>
          <text x="360" y="252" text-anchor="middle">step500</text>
        </g>

        <polyline points="0,66 120,17.6 240,33 360,46.2" fill="none" stroke="#3f41ff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="0,154 120,202.4 240,187 360,173.8" fill="none" stroke="#3f41ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 7" opacity="0.58"/>

        <g>
          <circle cx="0" cy="66" r="6.5" fill="#ffffff" stroke="#3f41ff" stroke-width="3"/>
          <circle cx="120" cy="17.6" r="6.5" fill="#ffffff" stroke="#3f41ff" stroke-width="3"/>
          <circle cx="240" cy="33" r="6.5" fill="#ffffff" stroke="#3f41ff" stroke-width="3"/>
          <circle cx="360" cy="46.2" r="6.5" fill="#ffffff" stroke="#3f41ff" stroke-width="3"/>

          <circle cx="0" cy="154" r="6.5" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="2.4"/>
          <circle cx="120" cy="202.4" r="6.5" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="2.4"/>
          <circle cx="240" cy="187" r="6.5" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="2.4"/>
          <circle cx="360" cy="173.8" r="6.5" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="2.4"/>
        </g>
      </g>
    </g>

    <g transform="translate(590 62)">
      <text x="180" y="0" text-anchor="middle" font-size="15" font-weight="700" fill="#111111">ROUGE-L</text>

      <g transform="translate(0 26)">
        <g stroke="#e6e8ee" stroke-width="1">
          <line x1="0" y1="220" x2="360" y2="220"/>
          <line x1="0" y1="176" x2="360" y2="176" stroke-dasharray="4 8"/>
          <line x1="0" y1="132" x2="360" y2="132" stroke-dasharray="4 8"/>
          <line x1="0" y1="88" x2="360" y2="88" stroke-dasharray="4 8"/>
          <line x1="0" y1="44" x2="360" y2="44" stroke-dasharray="4 8"/>
          <line x1="0" y1="0" x2="360" y2="0" stroke-dasharray="4 8"/>
          <line x1="0" y1="0" x2="0" y2="220"/>
        </g>

        <g fill="#5f6672" font-size="12" font-weight="500">
          <text x="-15" y="224" text-anchor="end">0.29</text>
          <text x="-15" y="180" text-anchor="end">0.30</text>
          <text x="-15" y="136" text-anchor="end">0.31</text>
          <text x="-15" y="92" text-anchor="end">0.32</text>
          <text x="-15" y="48" text-anchor="end">0.33</text>
          <text x="-15" y="4" text-anchor="end">0.34</text>
          <text x="0" y="252" text-anchor="middle">base</text>
          <text x="120" y="252" text-anchor="middle">step50</text>
          <text x="240" y="252" text-anchor="middle">step200</text>
          <text x="360" y="252" text-anchor="middle">step500</text>
        </g>

        <polyline points="0,99 120,79.64 240,57.2 360,48.84" fill="none" stroke="#3f41ff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="0,58.08 120,201.52 240,31.24 360,32.56" fill="none" stroke="#3f41ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 7" opacity="0.58"/>

        <g>
          <circle cx="0" cy="99" r="6.5" fill="#ffffff" stroke="#3f41ff" stroke-width="3"/>
          <circle cx="120" cy="79.64" r="6.5" fill="#ffffff" stroke="#3f41ff" stroke-width="3"/>
          <circle cx="240" cy="57.2" r="6.5" fill="#ffffff" stroke="#3f41ff" stroke-width="3"/>
          <circle cx="360" cy="48.84" r="6.5" fill="#ffffff" stroke="#3f41ff" stroke-width="3"/>

          <circle cx="0" cy="58.08" r="6.5" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="2.4"/>
          <circle cx="120" cy="201.52" r="6.5" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="2.4"/>
          <circle cx="240" cy="31.24" r="6.5" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="2.4"/>
          <circle cx="360" cy="32.56" r="6.5" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="2.4"/>
        </g>
      </g>
    </g>

    <g transform="translate(389 374)" font-size="14" font-weight="500" fill="#111111">
      <line x1="0" y1="0" x2="34" y2="0" stroke="#3f41ff" stroke-width="4.5" stroke-linecap="round"/>
      <circle cx="17" cy="0" r="5.5" fill="#ffffff" stroke="#3f41ff" stroke-width="2.6"/>
      <text x="46" y="5">Gemma4</text>
      <line x1="158" y1="0" x2="192" y2="0" stroke="#3f41ff" stroke-width="4" stroke-linecap="round" stroke-dasharray="7 7" opacity="0.58"/>
      <circle cx="175" cy="0" r="5.5" fill="url(#gemma3-hatch)" stroke="#3f41ff" stroke-width="2.2"/>
      <text x="204" y="5">Gemma3</text>
    </g>
  </g>
</svg>
