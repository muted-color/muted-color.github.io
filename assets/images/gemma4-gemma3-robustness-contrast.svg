<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" role="img" aria-labelledby="title desc">
  <title id="title">Gemma 4와 Gemma 3의 body corruption 조건 비교 plot</title>
  <desc id="desc">질문 본문 손상 조건에서 raw와 body-hard readability win rate를 비교한 slope plot이다. 두 모델 모두 raw가 더 높다.</desc>

  <rect width="860" height="420" fill="#ffffff"/>

  <g font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <g transform="translate(302 368)">
      <line x1="0" y1="12" x2="26" y2="12" stroke="#1f6a4f" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="13" cy="12" r="5" fill="#ffffff" stroke="#1f6a4f" stroke-width="2.5"/>
      <text x="38" y="17" font-size="14" fill="#111111">Gemma 4</text>

      <line x1="122" y1="12" x2="148" y2="12" stroke="#2563eb" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="135" cy="12" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
      <text x="160" y="17" font-size="14" fill="#111111">Gemma 3</text>
    </g>
  </g>

  <g transform="translate(176 62)">
    <text x="185" y="0" text-anchor="middle" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#111111">Readability Win Rate</text>

    <g stroke="#dfe4ea" stroke-width="1">
      <line x1="42" y1="30" x2="42" y2="280"/>
      <line x1="42" y1="280" x2="328" y2="280"/>
      <line x1="42" y1="30" x2="328" y2="30" stroke-dasharray="4 6"/>
      <line x1="42" y1="155" x2="328" y2="155" stroke-dasharray="4 6"/>
    </g>

    <g font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280">
      <text x="28" y="284" text-anchor="end">0.0</text>
      <text x="28" y="159" text-anchor="end">0.5</text>
      <text x="28" y="34" text-anchor="end">1.0</text>
      <text x="118" y="304" text-anchor="middle">Raw</text>
      <text x="252" y="304" text-anchor="middle">Body-hard</text>
    </g>

    <g fill="none" stroke-linecap="round" stroke-width="3.5">
      <line x1="118" y1="140" x2="252" y2="185" stroke="#1f6a4f"/>
      <line x1="118" y1="115" x2="252" y2="200" stroke="#2563eb"/>
    </g>

    <g font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="700">
      <circle cx="118" cy="140" r="5.5" fill="#ffffff" stroke="#1f6a4f" stroke-width="2.5"/>
      <circle cx="252" cy="185" r="5.5" fill="#ffffff" stroke="#1f6a4f" stroke-width="2.5"/>
      <text x="99" y="132" fill="#1f6a4f">0.56</text>
      <text x="264" y="178" fill="#1f6a4f">0.38</text>

      <circle cx="118" cy="115" r="5.5" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
      <circle cx="252" cy="200" r="5.5" fill="#ffffff" stroke="#2563eb" stroke-width="2.5"/>
      <text x="93" y="107" fill="#2563eb">0.66</text>
      <text x="264" y="193" fill="#2563eb">0.32</text>
    </g>
  </g>
</svg>
