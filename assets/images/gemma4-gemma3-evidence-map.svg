    <rect x="564" y="282" width="140" height="32" rx="8" fill="#4263eb"/>
    <text x="634" y="303" text-anchor="middle" fill="#ffffff">G3</text>
    <rect x="798" y="282" width="140" height="32" rx="8" fill="#f4b740"/>
    <text x="868" y="303" text-anchor="middle" fill="#6b4a00">Mix</text>

    <rect x="328" y="342" width="140" height="32" rx="8" fill="#10a37f"/>
